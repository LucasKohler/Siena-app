services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: runtime
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      SIENA__CORS__ALLOWEDORIGINS__0: http://localhost:3000
    ports:
      - "${API_PORT:-5000}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
