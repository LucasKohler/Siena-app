# Stack completo Siena (dev): Postgres + API com migrations e seed automáticos.
# Uso: docker compose up --build
# Requer Docker no WSL2 ou Docker Desktop com integração WSL.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: siena
      POSTGRES_USER: siena
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-siena_dev}
    ports:
      # Host 5433 por padrão — evita conflito com PostgreSQL nativo do Windows na 5432
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - siena_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siena -d siena"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: ${API_DOCKER_TARGET:-development}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=siena;Username=siena;Password=${POSTGRES_PASSWORD:-siena_dev}
      Persistence__Provider: Postgres
      Jwt__Issuer: ${Jwt__Issuer:-siena-api-dev}
      Jwt__Audience: ${Jwt__Audience:-siena-mobile-dev}
      Jwt__SigningKey: ${Jwt__SigningKey:-DEV-ONLY-REPLACE-via-Jwt__SigningKey-in-production-min-32-chars}
      Jwt__AccessTokenMinutes: ${Jwt__AccessTokenMinutes:-480}
      SIENA__CORS__ALLOWEDORIGINS__0: ${SIENA__CORS__ALLOWEDORIGINS__0:-http://localhost:3000}
      SIENA__CORS__ALLOWEDORIGINS__1: ${SIENA__CORS__ALLOWEDORIGINS__1:-http://localhost:8081}
    ports:
      - "${API_PORT:-5000}:8080"
    volumes:
      # Hot reload em Development (target development)
      - ./apps/api:/src
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 60s
    restart: unless-stopped

volumes:
  siena_pg_data:
